<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代號：拯救安妮亞 - 終極題庫版</title>
    <style>
        body { background-color: #1a1a1a; color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { width: 800px; height: 650px; background-color: #000; border-radius: 10px; box-shadow: 0 0 30px rgba(46, 204, 113, 0.4); position: relative; display: flex; flex-direction: column; overflow: hidden; border: 2px solid #555; }
        #character-portrait { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; transition: 0.5s; }
        #character-portrait::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.3); z-index: 1; transition: 0.5s; }
        .failed-portrait::after { background: rgba(231, 76, 60, 0.7) !important; }
        #character-portrait img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; position: relative; z-index: 0; }
        #hud { position: absolute; top: 20px; right: 20px; font-size: 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); padding: 8px 15px; border-radius: 15px; border: 2px solid #e74c3c; color: white; z-index: 10; }
        #scene-bg { flex: 1; background: transparent; position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; color: white; text-align: center; }
        #game-content { background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(8px); padding: 30px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.2); width: 85%; display: flex; flex-direction: column; align-items: center; }
        #dialogue-box { height: 150px; background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); color: #0f0; padding: 20px; box-sizing: border-box; border-top: 3px solid #0f0; font-size: 20px; cursor: pointer; position: relative; z-index: 3; }
        #speaker-name { color: #ffeb3b; font-weight: bold; margin-bottom: 10px; font-size: 22px; }
        #dialogue-text { line-height: 1.5; font-family: monospace; }
        .btn { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; margin: 10px; font-weight: bold; }
        .btn:hover { background-color: #45a049; }
        #next-btn { background-color: #3498db; font-size: 20px; padding: 10px 30px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .login-input { padding: 12px; font-size: 20px; text-align: center; margin: 10px; border-radius: 5px; border: 2px solid #ccc; width: 250px; display: block; }
        .input-box { padding: 10px; font-size: 24px; text-align: center; margin: 10px; border-radius: 5px; border: 2px solid #ccc; width: 220px; }
        .option-btn { background-color: #fff; color: #333; border: 2px solid #3498db; padding: 12px; margin: 5px 0; font-size: 18px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: bold; width: 100%; }
        .option-btn:hover { background-color: #e1f5fe; }
        .hidden { display: none !important; }
        #feedback { font-size: 24px; font-weight: bold; margin-top: 10px; min-height: 90px; text-shadow: 2px 2px 4px #000; }
        .correct { color: #2ecc71; }
        .incorrect { color: #e74c3c; line-height: 1.4; }
        .emoji-big { font-size: 60px; margin: 10px; }
        .status-bar { color: #f1c40f; font-size: 18px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="character-portrait"><img id="bg-img" src="twilight.webp"></div>
    <div id="hud" class="hidden">生命值：<span id="lives">❤️❤️❤️❤️❤️</span></div>
    
    <div id="scene-bg">
        <div id="game-content">
            <h1 id="title" style="color:#2ecc71; text-shadow: 2px 2px 4px #000;">MISSION START</h1>
            <div id="login-area">
                <input type="text" id="student-class" class="login-input" placeholder="輸入班級 (例: 501)" autocomplete="off">
                <input type="text" id="student-name" class="login-input" placeholder="輸入姓名 (例: 王小明)" autocomplete="off">
                <button id="start-btn" class="btn" style="margin-top: 20px;">開始執行任務</button>
            </div>
            <div id="play-area"></div>
            <div id="feedback"></div>
        </div>
    </div>
    
    <div id="dialogue-box" class="hidden">
        <div id="speaker-name">黃昏 (Loid)</div>
        <div id="dialogue-text"></div>
    </div>
</div>

<script>
    // ！！！請確認這裡是你的 Google 試算表網址 ！！！
    const webAppUrl = "https://script.google.com/macros/s/AKfycbzGmSVUTwRKuhMpvL7YDDb8E1c2dqzAwWNKAJ4IhhEZ_SNSDYopJwTkvdLNyspKqCEmNg/exec";

    // --- 5 大題型，各 10 題 ---
    const pools = {
        spelling: [
            { type: "input", emoji: "📱", question: "p _ _ _ e", answer: "phone", hint: "打電話用的工具" },
            { type: "input", emoji: "🎤", question: "s _ _ _ _ r", answer: "singer", hint: "拿著麥克風唱歌的人" },
            { type: "input", emoji: "🧥", question: "j _ _ _ _ t", answer: "jacket", hint: "冷的時候穿的外套" },
            { type: "input", emoji: "👓", question: "g _ _ _ _ _ s", answer: "glasses", hint: "戴在眼睛上的物品" },
            { type: "input", emoji: "🏥", question: "h _ _ _ _ _ _ l", answer: "hospital", hint: "生病了要去哪裡看醫生？" },
            { type: "input", emoji: "🚒", question: "f _ _ _ _ _ _ _ _ r", answer: "firefighter", hint: "幫忙救火的英雄" },
            { type: "input", emoji: "☂️", question: "u _ _ _ _ _ _ a", answer: "umbrella", hint: "下雨天要撐開的東西" },
            { type: "input", emoji: "💻", question: "e _ _ _ _ _ _ r", answer: "engineer", hint: "寫程式、修理機器的工程師" },
            { type: "input", emoji: "⌚", question: "w _ _ _ h", answer: "watch", hint: "戴在手腕上看時間的物品" },
            { type: "input", emoji: "🗝️", question: "k _ y", answer: "key", hint: "開門必備的物品，只有三個字母" }
        ],
        listeningWord: [
            { type: "audio", textToSpeak: "police officer", question: "🎧 聽語音，選出正確職業", options: ["police officer", "firefighter", "singer"], answer: 0, hint: "抓壞人、維持治安的人" },
            { type: "audio", textToSpeak: "baseball player", question: "🎧 聽語音，選出正確職業", options: ["scientist", "reporter", "baseball player"], answer: 2, hint: "打棒球的運動員" },
            { type: "audio", textToSpeak: "reporter", question: "🎧 聽語音，選出正確職業", options: ["reporter", "YouTuber", "engineer"], answer: 0, hint: "在電視上播報新聞的人" },
            { type: "audio", textToSpeak: "scientist", question: "🎧 聽語音，選出正確職業", options: ["singer", "scientist", "police officer"], answer: 1, hint: "在實驗室裡工作的人" },
            { type: "audio", textToSpeak: "singer", question: "🎧 聽語音，選出正確職業", options: ["baseball player", "singer", "reporter"], answer: 1, hint: "唱歌的人" },
            { type: "audio", textToSpeak: "YouTuber", question: "🎧 聽語音，選出正確職業", options: ["YouTuber", "engineer", "scientist"], answer: 0, hint: "拍影片上傳網路的人" },
            { type: "audio", textToSpeak: "lunch bag", question: "🎧 聽語音，這是在說什麼物品？", options: ["lunch bag", "umbrella", "jacket"], answer: 0, hint: "裝午餐的袋子" },
            { type: "audio", textToSpeak: "umbrella", question: "🎧 聽語音，這是在說什麼物品？", options: ["watch", "key", "umbrella"], answer: 2, hint: "下雨天用的雨傘" },
            { type: "audio", textToSpeak: "shoes", question: "🎧 聽語音，這是在說什麼物品？", options: ["glasses", "shoes", "phone"], answer: 1, hint: "穿在腳上的鞋子" },
            { type: "audio", textToSpeak: "watch", question: "🎧 聽語音，這是在說什麼物品？", options: ["key", "watch", "jacket"], answer: 1, hint: "手錶" }
        ],
        listeningPhonics: [
            { type: "audio", textToSpeak: "knock", question: "🎧 聽語音，選出發音正確的單字", options: ["lock", "rock", "knock"], answer: 2, hint: "kn 開頭時，k 是不發音的喔！" },
            { type: "audio", textToSpeak: "knee", question: "🎧 聽語音，選出發音正確的單字", options: ["knee", "see", "tea"], answer: 0, hint: "膝蓋的英文，kn 開頭 k 不發音" },
            { type: "audio", textToSpeak: "wrong", question: "🎧 聽語音，選出發音正確的單字", options: ["long", "wrong", "ring"], answer: 1, hint: "wr 開頭時 w 不發音，直接發 r 的音" },
            { type: "audio", textToSpeak: "write", question: "🎧 聽語音，選出發音正確的單字", options: ["right", "white", "write"], answer: 2, hint: "寫字的英文，wr 開頭 w 不發音" },
            { type: "audio", textToSpeak: "comb", question: "🎧 聽語音，選出發音正確的單字", options: ["comb", "cone", "come"], answer: 0, hint: "梳子，字尾的 b 其實是不發音的" },
            { type: "audio", textToSpeak: "climb", question: "🎧 聽語音，選出發音正確的單字", options: ["climb", "crime", "lime"], answer: 0, hint: "爬山，字尾的 b 不發音" },
            { type: "audio", textToSpeak: "sing", question: "🎧 聽語音，選出發音正確的單字", options: ["sink", "sing", "sin"], answer: 1, hint: "唱歌的英文，ng 結尾" },
            { type: "audio", textToSpeak: "king", question: "🎧 聽語音，選出發音正確的單字", options: ["kin", "king", "sink"], answer: 1, hint: "國王，ng 結尾" },
            { type: "audio", textToSpeak: "pink", question: "🎧 聽語音，選出發音正確的單字", options: ["pig", "pin", "pink"], answer: 2, hint: "粉紅色，注意聽字尾有輕輕的 k 音" },
            { type: "audio", textToSpeak: "bank", question: "🎧 聽語音，選出發音正確的單字", options: ["bang", "band", "bank"], answer: 2, hint: "銀行，nk 結尾有輕微的 k 音" }
        ],
        dialogue: [
            { type: "choice", question: "What do you want to be?", options: ["I want to be a reporter.", "He wants to be a reporter.", "Yes, I do."], answer: 0, hint: "守衛問 you (你)，回答時要自稱 I (我)" },
            { type: "choice", question: "What does he want to be?", options: ["I want to be a scientist.", "He wants to be a scientist.", "No, he doesn't."], answer: 1, hint: "問句問 he，回答也要用 he" },
            { type: "choice", question: "What does she want to be?", options: ["She wants to be a singer.", "He wants to be a singer.", "She is a singer."], answer: 0, hint: "問句問 she，回答也要用 she" },
            { type: "choice", question: "Does he want to be a YouTuber?", options: ["Yes, he does.", "Yes, she does.", "No, he don't."], answer: 0, hint: "Does he 開頭，回答也要有 he does 或 he doesn't" },
            { type: "choice", question: "Does she want to be an engineer?", options: ["No, she isn't.", "No, she doesn't.", "Yes, he does."], answer: 1, hint: "Does she 開頭，簡答要用 doesn't 結尾" },
            { type: "choice", question: "Whose watch is this?", options: ["It's Peter's watch.", "They're Peter's watches.", "It's my shoes."], answer: 0, hint: "watch 只有一個，要用 It's 來回答" },
            { type: "choice", question: "Whose lunch bag is this?", options: ["They're Amy's lunch bags.", "It's Amy's lunch bag.", "Yes, it is."], answer: 1, hint: "lunch bag 只有一個，要用 It's 回答" },
            { type: "choice", question: "Whose glasses are these?", options: ["It's my glass.", "They're John's glasses.", "These is John's glasses."], answer: 1, hint: "glasses 是複數，要用 They're 回答" },
            { type: "choice", question: "Whose shoes are these?", options: ["They're my shoes.", "It's my shoe.", "No, they aren't."], answer: 0, hint: "shoes 有兩隻以上，要用 They're 回答" },
            { type: "choice", question: "Whose key is this?", options: ["It's Mom's key.", "They're Mom's keys.", "It's Mom."], answer: 0, hint: "key 只有一把，要用 It's 回答" }
        ],
        grammar: [
            { type: "choice", question: "What ___ you want to be?", options: ["do", "does", "are"], answer: 0, hint: "遇到 you，前面要配 do" },
            { type: "choice", question: "What ___ he want to be?", options: ["do", "does", "is"], answer: 1, hint: "he 是「孤單老人」(第三人稱單數)，要用 does" },
            { type: "choice", question: "She ___ to be a police officer.", options: ["want", "wants", "wanting"], answer: 1, hint: "She 是「孤單老人」，現在式的動作後面要加上 s" },
            { type: "choice", question: "___ she want to be a singer?", options: ["Do", "Does", "Is"], answer: 1, hint: "she 是孤單老人，問句助動詞要用 Does" },
            { type: "choice", question: "No, he ___.", options: ["don't", "doesn't", "isn't"], answer: 1, hint: "he 的否定助動詞要用 doesn't" },
            { type: "choice", question: "Whose ___ is this?", options: ["umbrella", "umbrellas", "glasses"], answer: 0, hint: "is this 配單數物品" },
            { type: "choice", question: "Whose ___ are these?", options: ["shoe", "shoes", "key"], answer: 1, hint: "are these 配複數物品" },
            { type: "choice", question: "It is ___ jacket.", options: ["Ken", "Kens", "Ken's"], answer: 2, hint: "要表示「誰的」，名字後面要加一撇 s ('s)" },
            { type: "choice", question: "___ shoes are these?", options: ["Who", "Whose", "What"], answer: 1, hint: "問「是誰的」要用 Whose" },
            { type: "choice", question: "They ___ Amy's glasses.", options: ["is", "am", "are"], answer: 2, hint: "They 是複數，be 動詞要用 are" }
        ]
    };

    function realShuffle(arr) {
        return arr.sort(() => Math.random() - 0.5);
    }

    let story = [];
    let currentStage = 0;
    let wrongAttempts = 0;
    let startTime = 0;
    let studentClass = '', studentName = '';
    const MAX_WRONG = 5;

    // --- 遊戲初始化邏輯 ---
    function initStory() {
        // 從每個題庫各自隨機抽出 4 題
        const q1 = realShuffle(pools.spelling).slice(0, 4);
        const q2 = realShuffle(pools.listeningWord).slice(0, 4);
        const q3 = realShuffle(pools.listeningPhonics).slice(0, 4);
        const q4 = realShuffle(pools.dialogue).slice(0, 4);
        const q5 = realShuffle(pools.grammar).slice(0, 4);

        story = [
            { type: "dialogue", speaker: "黃昏 (Loid)", pic: "twilight.webp", text: "特務，任務開始了。前方有 20 道隨機加密防線，請小心應對！" },
            ...q1, ...q2, ...q3, ...q4, ...q5,
            { type: "dialogue", speaker: "安妮亞 (Anya)", pic: "anya.jpg", text: "父親！謝謝特務哥哥/姊姊救我！Waku Waku！🥜" },
            { type: "end", text: "MISSION ACCOMPLISHED" }
        ];
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        studentClass = document.getElementById('student-class').value.trim();
        studentName = document.getElementById('student-name').value.trim();
        if (!studentClass || !studentName) { alert('請輸入特務身分！'); return; }
        
        initStory();
        startTime = Date.now();
        document.getElementById('login-area').classList.add('hidden');
        document.getElementById('hud').classList.remove('hidden');
        nextStage();
    });

    function nextStage() {
        if (currentStage >= story.length) return;
        const data = story[currentStage];
        const playArea = document.getElementById('play-area');
        const diagBox = document.getElementById('dialogue-box');
        const bgImg = document.getElementById('bg-img');
        const gameContent = document.getElementById('game-content');

        playArea.innerHTML = ""; document.getElementById('feedback').innerHTML = "";
        diagBox.classList.add('hidden'); gameContent.classList.remove('hidden');

        if (data.type === "dialogue") {
            gameContent.classList.add('hidden'); diagBox.classList.remove('hidden');
            document.getElementById('speaker-name').innerText = data.speaker;
            document.getElementById('dialogue-text').innerText = data.text;
            bgImg.src = data.pic;
            diagBox.onclick = () => { currentStage++; nextStage(); };
        } else if (data.type === "input") {
            // 加入當前題數進度條
            playArea.innerHTML = `
                <div class="status-bar">進度：第 ${currentStage} / 20 關</div>
                <div class="emoji-big">${data.emoji}</div>
                <h2>請看圖拼出單字</h2>
                <input type="text" id="ans" class="input-box" placeholder="${data.question}" autocomplete="off">
                <br><button class="btn" onclick="checkInput()">送出</button>
            `;
            document.getElementById('ans').focus();
            document.getElementById('ans').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') checkInput();
            });
        } else if (data.type === "choice" || data.type === "audio") {
            const correctText = data.options[data.answer];
            const shuffledOptions = realShuffle([...data.options]);
            const newIdx = shuffledOptions.indexOf(correctText);
            let btns = shuffledOptions.map((o, i) => `<button class="option-btn" onclick="checkChoice(${i}, ${newIdx})">${o}</button>`).join("");
            let audioBtn = data.type === "audio" ? `<button class="btn" style="background:#f39c12" onclick="playAudio('${data.textToSpeak}')">🔊 點擊聽語音</button>` : "";
            
            playArea.innerHTML = `
                <div class="status-bar">進度：第 ${currentStage} / 20 關</div>
                <h2>${data.question}</h2>
                ${audioBtn}
                <div style="width:100%; margin-top:10px;">${btns}</div>
            `;
        } else if (data.type === "end") {
            finishGame();
        }
    }

    window.checkInput = () => {
        const userAns = document.getElementById('ans').value.toLowerCase().trim();
        if (userAns === story[currentStage].answer.toLowerCase()) handleCorrect();
        else handleWrong();
    };

    window.checkChoice = (sel, cor) => {
        if (sel === cor) handleCorrect();
        else handleWrong();
    };

    function handleCorrect() {
        document.getElementById('feedback').innerHTML = `<div class="correct">✔️ 成功！</div><button id="next-btn" class="btn">進入下一關 ➡️</button>`;
        document.getElementById('next-btn').onclick = () => { currentStage++; nextStage(); };
        // 鎖定按鈕避免重複點擊
        const btns = document.querySelectorAll('.option-btn, .btn');
        btns.forEach(b => { if(b.id !== 'next-btn') b.disabled = true; });
        if(document.getElementById('ans')) document.getElementById('ans').disabled = true;
    }

    function handleWrong() {
        wrongAttempts++; updateLives();
        if (wrongAttempts >= MAX_WRONG) {
            document.getElementById('bg-img').src = "alert.webp";
            document.getElementById('game-content').innerHTML = `
                <h1 style="color:#e74c3c; font-size:40px;">MISSION FAILED</h1>
                <h2>生命值已耗盡，任務失敗！</h2>
                <button class="btn" onclick="location.reload()">重新挑戰</button>
            `;
        } else {
            // --- 這裡就是觸發專屬提示的地方 ---
            document.getElementById('feedback').innerHTML = `
                <span class="incorrect">❌ 錯誤！警報響起！</span><br>
                <span style="color: #f39c12; font-size: 20px;">💡 提示：${story[currentStage].hint}</span>
            `;
        }
    }

    function updateLives() {
        let h = ''; 
        for(let i=0; i < MAX_WRONG - wrongAttempts; i++) h += '❤️'; 
        for(let i=0; i < wrongAttempts; i++) h += '🖤';
        document.getElementById('lives').innerText = h;
    }

    function playAudio(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang='en-US'; window.speechSynthesis.speak(u); }

    function finishGame() {
        const endTime = Date.now();
        const timeSec = Math.floor((endTime - startTime)/1000);
        const timeStr = `${Math.floor(timeSec/60)}分${timeSec%60}秒`;
        const totalQ = 20; // 固定 20 題
        const acc = Math.round((totalQ / (totalQ + wrongAttempts)) * 100);

        document.getElementById('play-area').innerHTML = `
            <h1 style="color:#2ecc71;">任務成功！</h1>
            <p style="font-size: 18px;">正確率：${acc}% | 時間：${timeStr}</p>
            <p class="status-bar">📡 正在上傳成績至總部...</p>
        `;
        
        fetch(`${webAppUrl}?cls=${encodeURIComponent(studentClass)}&name=${encodeURIComponent(studentName)}&acc=${acc}&timeSec=${timeSec}&timeStr=${encodeURIComponent(timeStr)}`, {mode:'no-cors'})
        .then(() => {
            document.getElementById('play-area').innerHTML += `
                <p style="color:#f1c40f">✅ 成績已送達 Loid 的試算表！</p>
                <button class="btn" onclick="location.reload()">再玩一次</button>
            `;
        });
    }
</script>
</body>
</html>
